<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GoodsFlow — Donation Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --text: #1A1714;
    --text-muted: #8A837A;
    --accent: #D35322;
    --accent-hover: #B8441A;
    --accent-light: #FFF0EB;
    --green: #2D8A4E;
    --green-light: #E8F5EC;
    --red: #C93B3B;
    --red-light: #FDECEC;
    --yellow: #C68B1E;
    --yellow-light: #FFF6E0;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- NAV ---- */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bottom-nav button {
    flex: 1;
    padding: 10px 4px 8px;
    background: none; border: none;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .bottom-nav button.active { color: var(--accent); }
  .bottom-nav button svg { width: 22px; height: 22px; }

  /* ---- LAYOUT ---- */
  .app-header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-header h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
  }
  .app-header h1 span { color: var(--accent); }
  .logout-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; font-family: var(--font); font-size: 12px;
    color: var(--text-muted); cursor: pointer;
  }
  .role-badge {
    font-size: 11px; font-family: var(--mono);
    background: var(--accent-light); color: var(--accent);
    padding: 3px 8px; border-radius: 20px; margin-left: 8px;
  }

  .screen { display: none; padding: 0 16px 100px; }
  .screen.active { display: block; }

  .screen-title {
    font-size: 17px; font-weight: 700; margin: 12px 0 16px;
    letter-spacing: -0.3px;
  }

  /* ---- CARDS ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }

  /* ---- FORMS ---- */
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: var(--font); font-size: 16px;
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 14px;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }
  textarea.form-input { resize: vertical; min-height: 70px; }

  /* Category grid */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .cat-btn {
    padding: 14px 8px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .cat-btn:hover { border-color: var(--accent); }
  .cat-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }

  /* Quantity stepper */
  .qty-stepper {
    display: flex; align-items: center; gap: 0; margin-bottom: 14px;
  }
  .qty-stepper button {
    width: 52px; height: 52px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 22px; font-weight: 700;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s;
  }
  .qty-stepper button:first-child { border-radius: 10px 0 0 10px; }
  .qty-stepper button:last-child { border-radius: 0 10px 10px 0; }
  .qty-stepper button:active { background: var(--bg); }
  .qty-stepper input {
    width: 70px; height: 52px;
    border: 1.5px solid var(--border); border-left: 0; border-right: 0;
    text-align: center;
    font-family: var(--mono); font-size: 20px; font-weight: 700;
    outline: none; background: var(--surface);
  }

  /* Big submit */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: white;
    border: none; border-radius: 12px;
    font-family: var(--font); font-size: 16px; font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.3px;
    margin-top: 6px;
  }
  .submit-btn:hover { background: var(--accent-hover); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Photo input */
  .photo-input-wrap {
    margin-bottom: 14px;
  }
  .photo-label {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px; color: var(--text-muted);
    transition: border-color 0.15s;
  }
  .photo-label:hover { border-color: var(--accent); }
  .photo-label svg { flex-shrink: 0; }
  .photo-preview { max-width: 100%; border-radius: 10px; margin-top: 8px; display: none; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: white;
    padding: 12px 24px; border-radius: 10px;
    font-weight: 600; font-size: 14px;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--red); }

  /* ---- REPORTS ---- */
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-muted); font-weight: 400; }
  .stat-value { font-family: var(--mono); font-weight: 700; }
  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  .warning-card {
    background: var(--red-light);
    border: 1.5px solid var(--red);
    border-radius: var(--radius);
    padding: 16px; margin-bottom: 10px;
  }
  .warning-card h4 { color: var(--red); font-size: 14px; margin-bottom: 4px; }
  .warning-card p { font-size: 13px; color: var(--text-muted); }

  .export-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 12px 20px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; color: var(--text);
    margin-right: 8px; margin-bottom: 8px;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  .chart-container { position: relative; height: 260px; margin: 16px 0 8px; }

  /* ---- LOGIN ---- */
  .login-screen {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-box {
    width: 100%; max-width: 360px;
    text-align: center;
  }
  .login-box h1 { font-size: 32px; margin-bottom: 4px; }
  .login-box h1 span { color: var(--accent); }
  .login-box p { color: var(--text-muted); margin-bottom: 28px; font-size: 14px; }

  /* ---- HISTORY ---- */
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .history-meta { font-size: 12px; color: var(--text-muted); }
  .history-qty { font-family: var(--mono); font-weight: 700; font-size: 15px; }

  @media (min-width: 600px) {
    .screen { max-width: 500px; margin: 0 auto; }
    .cat-grid { grid-template-columns: repeat(5, 1fr); }
  }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box card">
    <h1>Goods<span>Flow</span></h1>
    <p>Women's Center Donation Ledger</p>
    <input type="password" class="form-input" id="loginPw" placeholder="Enter password" autocomplete="off">
    <button class="submit-btn" onclick="doLogin()">Sign In</button>
    <p style="margin-top:14px;font-size:12px;color:var(--text-muted)">
      Volunteer: <code>volunteer123</code> &nbsp;|&nbsp; Staff: <code>staff123</code>
    </p>
  </div>
</div>

<!-- MAIN APP -->
<div id="appShell" style="display:none">

  <!-- Header -->
  <div class="app-header">
    <div style="display:flex;align-items:center">
      <h1>Goods<span>Flow</span></h1>
      <span class="role-badge" id="roleBadge"></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>

  <!-- SCREEN A: INTAKE -->
  <div class="screen active" id="screenIntake">
    <h2 class="screen-title">📦 Quick Intake</h2>
    <div class="card">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="intakeCatGrid"></div>

      <label class="form-label">Quantity</label>
      <div class="qty-stepper">
        <button onclick="stepQty('intakeQty',-1)">−</button>
        <input type="number" id="intakeQty" value="1" min="1">
        <button onclick="stepQty('intakeQty',1)">+</button>
      </div>

      <label class="form-label">Your Name</label>
      <input class="form-input" id="intakePerson" placeholder="e.g. Maria L.">

      <label class="form-label">Notes (optional)</label>
      <textarea class="form-input" id="intakeNotes" placeholder="Toothbrushes, sealed boxes..."></textarea>

      <div class="photo-input-wrap">
        <label class="photo-label" for="intakePhoto">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="13" r="3"/><path d="M5 3v0a2 2 0 012-2h2l1 2h4l1-2h2a2 2 0 012 2v0"/></svg>
          <span>Add photo (optional)</span>
        </label>
        <input type="file" id="intakePhoto" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this,'intakePreview')">
        <img class="photo-preview" id="intakePreview">
      </div>

      <button class="submit-btn" id="intakeSubmit" onclick="submitIntake()">Save Intake</button>
    </div>

    <h3 style="font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--text-muted)">Recent Intake</h3>
    <div class="card" id="intakeHistory"><p style="color:var(--text-muted);font-size:13px">Loading...</p></div>
  </div>

  <!-- SCREEN B: OUTBOUND -->
  <div class="screen" id="screenOutbound">
    <h2 class="screen-title">🚀 Quick Outbound</h2>
    <div class="card">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="outboundCatGrid"></div>

      <label class="form-label">Quantity</label>
      <div class="qty-stepper">
        <button onclick="stepQty('outboundQty',-1)">−</button>
        <input type="number" id="outboundQty" value="1" min="1">
        <button onclick="stepQty('outboundQty',1)">+</button>
      </div>

      <label class="form-label">Given to / Logged by</label>
      <input class="form-input" id="outboundPerson" placeholder="e.g. Front Desk">

      <label class="form-label">Notes (optional)</label>
      <textarea class="form-input" id="outboundNotes" placeholder="Family of 3, scheduled pickup..."></textarea>

      <button class="submit-btn" id="outboundSubmit" onclick="submitOutbound()">Save Outbound</button>
    </div>

    <h3 style="font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--text-muted)">Recent Outbound</h3>
    <div class="card" id="outboundHistory"><p style="color:var(--text-muted);font-size:13px">Loading...</p></div>
  </div>

  <!-- SCREEN C: REPORTS -->
  <div class="screen" id="screenReports">
    <h2 class="screen-title">📊 Reports</h2>

    <div id="lowInventorySection"></div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h3 style="font-size:15px;font-weight:700">7-Day Summary</h3>
      </div>
      <div id="summaryTable"><p style="color:var(--text-muted);font-size:13px">Loading...</p></div>
    </div>

    <div class="card">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:4px">Cumulative: Intake vs Outbound</h3>
      <div class="chart-container"><canvas id="cumulativeChart"></canvas></div>
    </div>

    <div style="margin-top:12px">
      <button class="export-btn" onclick="exportCSV('intake')">⬇ Export Intake CSV</button>
      <button class="export-btn" onclick="exportCSV('outbound')">⬇ Export Outbound CSV</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="active" onclick="switchScreen('Intake',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/><rect x="3" y="3" width="18" height="18" rx="3" stroke-width="1.5"/></svg>
      Intake
    </button>
    <button onclick="switchScreen('Outbound',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Outbound
    </button>
    <button onclick="switchScreen('Reports',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 4 4-8"/></svg>
      Reports
    </button>
  </nav>
</div>

<script>
// ========== STATE ==========
let TOKEN = localStorage.getItem('gf_token') || '';
let ROLE = localStorage.getItem('gf_role') || '';
let CATEGORIES = [];
let cumulativeChartInstance = null;

// ========== API HELPER ==========
async function api(path, opts = {}) {
  const headers = opts.headers || {};
  if (TOKEN) headers['X-Auth-Token'] = TOKEN;
  if (!(opts.body instanceof FormData)) {
    headers['Content-Type'] = headers['Content-Type'] || 'application/json';
  }
  const res = await fetch(path, { ...opts, headers });
  if (res.status === 401 || res.status === 403) {
    doLogout();
    throw new Error('Unauthorized');
  }
  return res;
}

// ========== TOAST ==========
function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// ========== AUTH ==========
async function doLogin() {
  const pw = document.getElementById('loginPw').value.trim();
  if (!pw) return;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) { toast('Wrong password', true); return; }
    const data = await res.json();
    TOKEN = data.token;
    ROLE = data.role;
    localStorage.setItem('gf_token', TOKEN);
    localStorage.setItem('gf_role', ROLE);
    showApp();
  } catch (e) { toast('Login failed', true); }
}

function doLogout() {
  TOKEN = ''; ROLE = '';
  localStorage.removeItem('gf_token');
  localStorage.removeItem('gf_role');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('roleBadge').textContent = ROLE;
  loadCategories();
  loadIntakeHistory();
  loadOutboundHistory();
}

// ========== INIT ==========
document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (TOKEN) showApp(); // auto-login if token stored

// ========== CATEGORIES ==========
async function loadCategories() {
  try {
    const res = await api('/api/categories');
    CATEGORIES = await res.json();
    renderCatGrid('intakeCatGrid', 'intakeCat');
    renderCatGrid('outboundCatGrid', 'outboundCat');
  } catch (e) {}
}

function renderCatGrid(containerId, stateKey) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  const emojis = { hygiene: '🧴', clothing: '👕', food: '🍎', kids: '🧸', misc: '📦' };
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat-btn';
    btn.textContent = (emojis[c.name] || '📦') + ' ' + c.display_name;
    btn.onclick = () => selectCat(containerId, stateKey, c.name, btn);
    grid.appendChild(btn);
  });
}

let selectedCats = { intakeCat: '', outboundCat: '' };
function selectCat(containerId, stateKey, val, btn) {
  document.querySelectorAll(`#${containerId} .cat-btn`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCats[stateKey] = val;
}

// ========== QUANTITY STEPPER ==========
function stepQty(id, delta) {
  const inp = document.getElementById(id);
  const v = Math.max(1, parseInt(inp.value || 1) + delta);
  inp.value = v;
}

// ========== PHOTO PREVIEW ==========
function previewPhoto(input, previewId) {
  const preview = document.getElementById(previewId);
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
    reader.readAsDataURL(input.files[0]);
  } else {
    preview.style.display = 'none';
  }
}

// ========== SCREEN SWITCHING ==========
function switchScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + name).classList.add('active');
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'Reports') loadReports();
}

// ========== SUBMIT INTAKE ==========
async function submitIntake() {
  const cat = selectedCats.intakeCat;
  const qty = parseInt(document.getElementById('intakeQty').value) || 1;
  const person = document.getElementById('intakePerson').value.trim();
  const notes = document.getElementById('intakeNotes').value.trim();
  const photoInput = document.getElementById('intakePhoto');

  if (!cat) { toast('Pick a category', true); return; }
  if (!person) { toast('Enter your name', true); return; }

  const fd = new FormData();
  fd.append('category', cat);
  fd.append('quantity', qty);
  fd.append('intake_person', person);
  fd.append('notes', notes);
  if (photoInput.files[0]) fd.append('photo', photoInput.files[0]);

  const btn = document.getElementById('intakeSubmit');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const res = await api('/api/intake', { method: 'POST', body: fd });
    if (res.ok) {
      toast('✓ Intake saved!');
      // Reset form
      document.getElementById('intakeQty').value = 1;
      document.getElementById('intakeNotes').value = '';
      photoInput.value = '';
      document.getElementById('intakePreview').style.display = 'none';
      document.querySelectorAll('#intakeCatGrid .cat-btn').forEach(b => b.classList.remove('selected'));
      selectedCats.intakeCat = '';
      loadIntakeHistory();
    } else { toast('Save failed', true); }
  } catch (e) { toast('Network error', true); }
  btn.disabled = false; btn.textContent = 'Save Intake';
}

// ========== SUBMIT OUTBOUND ==========
async function submitOutbound() {
  const cat = selectedCats.outboundCat;
  const qty = parseInt(document.getElementById('outboundQty').value) || 1;
  const person = document.getElementById('outboundPerson').value.trim();
  const notes = document.getElementById('outboundNotes').value.trim();

  if (!cat) { toast('Pick a category', true); return; }
  if (!person) { toast('Enter a name', true); return; }

  const btn = document.getElementById('outboundSubmit');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const res = await api('/api/outbound', {
      method: 'POST',
      body: JSON.stringify({ category: cat, quantity: qty, outbound_person: person, notes }),
    });
    if (res.ok) {
      toast('✓ Outbound saved!');
      document.getElementById('outboundQty').value = 1;
      document.getElementById('outboundNotes').value = '';
      document.querySelectorAll('#outboundCatGrid .cat-btn').forEach(b => b.classList.remove('selected'));
      selectedCats.outboundCat = '';
      loadOutboundHistory();
    } else { toast('Save failed', true); }
  } catch (e) { toast('Network error', true); }
  btn.disabled = false; btn.textContent = 'Save Outbound';
}

// ========== HISTORY ==========
async function loadIntakeHistory() {
  try {
    const res = await api('/api/intake?limit=10');
    const items = await res.json();
    const container = document.getElementById('intakeHistory');
    if (!items.length) { container.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No records yet</p>'; return; }
    container.innerHTML = items.map(i => `
      <div class="history-item">
        <div>
          <div style="font-weight:600;font-size:14px">${escHtml(i.category)} — ${escHtml(i.intake_person)}</div>
          <div class="history-meta">${timeAgo(i.intake_time)}${i.notes ? ' · ' + escHtml(i.notes.slice(0,40)) : ''}</div>
        </div>
        <div class="history-qty" style="color:var(--green)">+${i.quantity}</div>
      </div>
    `).join('');
  } catch (e) {}
}

async function loadOutboundHistory() {
  try {
    const res = await api('/api/outbound?limit=10');
    const items = await res.json();
    const container = document.getElementById('outboundHistory');
    if (!items.length) { container.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No records yet</p>'; return; }
    container.innerHTML = items.map(i => `
      <div class="history-item">
        <div>
          <div style="font-weight:600;font-size:14px">${escHtml(i.category)} — ${escHtml(i.outbound_person)}</div>
          <div class="history-meta">${timeAgo(i.outbound_time)}${i.notes ? ' · ' + escHtml(i.notes.slice(0,40)) : ''}</div>
        </div>
        <div class="history-qty" style="color:var(--red)">−${i.quantity}</div>
      </div>
    `).join('');
  } catch (e) {}
}

// ========== REPORTS ==========
async function loadReports() {
  try {
    // Summary
    const sumRes = await api('/api/reports/summary?days=7');
    const summary = await sumRes.json();
    const st = document.getElementById('summaryTable');
    st.innerHTML = summary.map(s => `
      <div class="stat-row">
        <span class="stat-label">${escHtml(s.display_name)}</span>
        <span>
          <span style="color:var(--green);font-family:var(--mono);font-size:13px">↑${s.intake_total}</span>
          &nbsp;
          <span style="color:var(--red);font-family:var(--mono);font-size:13px">↓${s.outbound_total}</span>
          &nbsp;
          <span class="stat-value ${s.net >= 0 ? 'positive' : 'negative'}">${s.net >= 0 ? '+' : ''}${s.net}</span>
        </span>
      </div>
    `).join('');

    // Cumulative chart
    const cumRes = await api('/api/reports/cumulative');
    const cumulative = await cumRes.json();
    renderCumulativeChart(cumulative);

    // Low inventory
    const lowRes = await api('/api/reports/low-inventory?window=14');
    const warnings = await lowRes.json();
    const lis = document.getElementById('lowInventorySection');
    if (warnings.length) {
      lis.innerHTML = `<h3 style="font-size:15px;font-weight:700;margin-bottom:10px;color:var(--red)">⚠ Low Inventory Alerts</h3>` +
        warnings.map(w => `
          <div class="warning-card">
            <h4>${escHtml(w.display_name)}</h4>
            <p>14-day intake: ${w.intake_14d} · outbound: ${w.outbound_14d} · deficit: <strong>${w.deficit}</strong> (threshold: ${w.threshold})</p>
          </div>
        `).join('');
    } else {
      lis.innerHTML = '<div class="card" style="background:var(--green-light);border-color:var(--green)"><p style="color:var(--green);font-weight:600;font-size:14px">✓ All categories above threshold</p></div>';
    }
  } catch (e) { console.error(e); }
}

function renderCumulativeChart(data) {
  const ctx = document.getElementById('cumulativeChart').getContext('2d');
  if (cumulativeChartInstance) cumulativeChartInstance.destroy();
  cumulativeChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.display_name),
      datasets: [
        {
          label: 'Intake',
          data: data.map(d => d.intake_total),
          backgroundColor: '#2D8A4E',
          borderRadius: 6,
        },
        {
          label: 'Outbound',
          data: data.map(d => d.outbound_total),
          backgroundColor: '#C93B3B',
          borderRadius: 6,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { family: "'DM Sans'" }, usePointStyle: true, pointStyle: 'circle' } },
      },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, grid: { color: '#E8E4DF' } },
      },
    },
  });
}

// ========== CSV EXPORT ==========
async function exportCSV(type) {
  try {
    const res = await api(`/api/reports/export.csv?type=${type}`);
    if (res.status === 403) { toast('Staff access required', true); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `goodsflow_${type}.csv`;
    a.click(); URL.revokeObjectURL(url);
    toast('✓ CSV downloaded');
  } catch (e) { toast('Export failed', true); }
}

// ========== UTILS ==========
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function timeAgo(iso) {
  const d = new Date(iso + (iso.includes('Z') ? '' : 'Z'));
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}
